# Supabase CLI — Configuration locale
# Documentation : https://supabase.com/docs/reference/cli/config

[api]
# Port de l'API REST (PostgREST) + GoTrue (Auth)
port = 54321
# Schémas exposés par l'API REST (public uniquement — jamais auth, storage)
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
# TLS désactivé en local (géré par Vercel/Supabase en prod)
enabled = false

[db]
# Port PostgreSQL local (connexion directe — dev uniquement)
# En production : utiliser le pooler port 6543 pour les Server Actions
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
# Serveur email local (reçoit les emails Supabase Auth en dev)
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# Taille maximale d'un fichier uploadé (200 KB max selon les règles du projet)
file_size_limit = "200KB"
# Bucket racine pour les images produits (créé manuellement ou via migration)
# Accès : signed URLs uniquement (bucket privé)

[auth]
enabled = true
# URL du site (utilisée pour les redirections d'auth)
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
# Durée du JWT access token
jwt_expiry = 3600
# Refresh token rolling (sécurité renforcée)
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.email.smtp]
host = "inbucket"
port = 2500
user = "fake"
pass = "fake"
admin_email = "admin@souqly.fr"
sender_name = "Souqly"

[auth.sms]
enable_signup = false
enable_confirmations = false

[analytics]
enabled = false

[experimental]
# Activé pour les fonctions Edge en local
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
